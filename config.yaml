# ============================================================
# ORB Trading Bot — Main Configuration
# ============================================================

# IBKR Connection
ibkr:
  host: "ibgateway"
  port: 4004          # 4004 = IB Gateway internal API port (bypass socat IPv6 issue)
  client_id: 1
  paper_trading: true

# Trading Schedule
trading:
  start_time: "09:30"
  end_time: "16:00"
  trade_dow: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"]
  update_interval_seconds: 30

# Opening Range
opening_range:
  duration_minutes: 15   # OR window: start_time → start_time + duration

# Breakout & Retest
strategy:
  breakout_threshold_points: 0.05
  retest_window_minutes: 15
  retest_max_candles: 5
  retest_confirmation_type: "touch"   # "touch" or "close_above"

# Risk Management
risk:
  risk_per_trade_percent: 0.75
  max_daily_loss_percent: 3.0
  max_open_positions: 4
  take_profit_strategy: "swing_high_touch"
  min_gain_percent: 2.0         # skip trade if target is less than 2% above entry
  require_discord_approval: true
  approval_timeout_seconds: 60
  # ── HARD safety caps (absolute last line of defense before a real order) ──
  # Any BUY exceeding EITHER cap is rejected outright, regardless of sizing math.
  # If paper_trading is false and either cap is unset, ALL buys are blocked.
  # Testing-on-real defaults: keep tiny (a couple of dollars).
  max_order_value_usd: 10       # reject any single order worth more than this
  max_shares_per_order: 2       # reject any order for more shares than this

# Global Stock Filters (applied on top of universe.csv)
filters:
  min_avg_volume: 500000
  min_price: 5.0
  max_price: 500.0
  volatility_min: 70
  volatility_max: 110
  rsi_14_min: 35
  rsi_14_max: 70

# IBKR Commission (approximate)
commissions:
  per_share: 0.005
  min_per_order: 1.0

# Telegram
telegram:
  approval_timeout_seconds: 60   # if no reply in 60s, skip the trade

# Trading Log telemetry (Trading Log dashboard tab + Telegram phase alerts)
telemetry:
  telegram_updates: true   # ping Telegram when a stock breaks out / retests / drops below OR low

# UI & Logging
ui:
  show_ui: true
  daily_log_files: true
  log_level: "INFO"   # DEBUG | INFO | WARNING | ERROR
