services:
  ibgateway:
    build:
      context: .
      dockerfile: Dockerfile.ibgateway
    restart: unless-stopped
    environment:
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: paper
      TWS_ACCEPT_INCOMING: accept
      READ_ONLY_API: "no"
      TWS_ALLOW_BLIND_TRADING: "yes"
      VNC_SERVER_PASSWORD: ibgateway
    ports:
      - "4002:4002"   # IB Gateway paper API port
      - "5900:5900"   # VNC for manual access if needed

  ibgateway-live:
    build:
      context: .
      dockerfile: Dockerfile.ibgateway
    restart: unless-stopped
    environment:
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: live
      TWS_ACCEPT_INCOMING: accept
      READ_ONLY_API: "yes"
      VNC_SERVER_PASSWORD: ibgateway
    # no port exposed — Streamlit connects via internal Docker network only

  orb-bot:
    build: .
    restart: unless-stopped
    depends_on:
      - ibgateway
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./universe:/app/universe
      - ./logs:/app/logs
      - ./data:/app/data
    command: python main.py

  watchdog:
    image: python:3.12-slim
    restart: unless-stopped
    depends_on:
      - orb-bot
    env_file:
      - .env
    environment:
      WATCHDOG_CONTAINERS: "stock_robot-orb-bot-1"
      WATCHDOG_MAX_RESTARTS: "5"
      WATCHDOG_CHECK_INTERVAL: "60"
    volumes:
      - ./watchdog.py:/watchdog.py:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "pip install requests docker --quiet && python /watchdog.py"

  streamlit-ui:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./universe:/app/universe
      - ./logs:/app/logs
      - ./data:/app/data
      - ./ui:/app/ui
      - ./my_portfolio.yaml:/app/my_portfolio.yaml
      - ./google_credentials.json:/app/google_credentials.json:ro
    ports:
      - "8501:8501"
    command: streamlit run ui/streamlit_app.py --server.address 0.0.0.0 --server.port 8501

