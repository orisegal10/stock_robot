version: "3.9"

services:
  ibgateway:
    build:
      context: .
      dockerfile: Dockerfile.ibgateway
    restart: unless-stopped
    environment:
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: paper
      TWS_ACCEPT_INCOMING: accept
      TWS_READONLY_API: "no"
      TWS_ALLOW_BLIND_TRADING: "yes"
      VNC_SERVER_PASSWORD: ibgateway
    ports:
      - "4002:4002"   # IB Gateway paper API port
      - "4001:4001"   # IB Gateway live API port
      - "5900:5900"   # VNC for manual access if needed

  orb-bot:
    build: .
    restart: unless-stopped
    depends_on:
      - ibgateway
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./universe:/app/universe
      - ./logs:/app/logs
      - ./data:/app/data
    command: python main.py

  streamlit-ui:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./universe:/app/universe
      - ./logs:/app/logs
      - ./data:/app/data
    ports:
      - "8501:8501"
    command: streamlit run ui/streamlit_app.py --server.address 0.0.0.0 --server.port 8501

